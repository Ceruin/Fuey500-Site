<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuey500 Developer Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;700&display=swap');
        
        :root {
            --tf-red: #b8383b;
            --tf-blu: #5885a2;
            --tf-orange: #ef6e14;
            --tf-tan: #e1d8be;
            --tf-dark: #2b2622;
            --tf-black: #1a1714;
        }

        body {
            background-color: var(--tf-dark);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: var(--tf-tan);
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
            transition: padding-right 0.3s ease;
        }

        body.admin-active { padding-right: 450px; }
        nav { transition: right 0.3s ease; right: 0; }
        body.admin-active nav { right: 450px; }

        .tf-font { text-transform: uppercase; font-weight: 700; font-style: italic; letter-spacing: -1px; }
        .tf-skew { transform: skew(-12deg); }
        .tf-skew-rev { transform: skew(12deg); }

        .mann-co-border {
            border: 4px solid var(--tf-black);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
        }

        .blueprint-card {
            background-color: #1e3a8a;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            border: 2px solid #3b82f6;
        }

        .nav-btn {
            background: #3c352e;
            color: white;
            transition: all 0.15s ease-in-out;
            border-bottom: 4px solid #25211e;
        }
        .nav-btn:hover { background: #4d443b; transform: translateY(-2px); }
        .nav-btn.active {
            background: var(--tf-orange);
            border-bottom-color: #a34b0d;
        }

        .admin-controls {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 50;
            gap: 6px;
        }
        body.admin-active .admin-controls { display: flex; }
        
        .admin-btn {
            background: var(--tf-black);
            color: white;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #4d433b;
            cursor: pointer;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }
        .admin-btn:hover { background: var(--tf-orange); transform: scale(1.1); }

        #adminPanel {
            display: none;
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 450px;
            background: var(--tf-black);
            z-index: 1000;
            border-left: 6px solid var(--tf-orange);
            padding: 1.5rem;
            box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            font-family: sans-serif;
            overflow-y: auto;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .video-thumb {
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
            border: 2px solid #4d433b;
        }

        .group-header {
            background: var(--tf-black);
            border-left: 4px solid var(--tf-orange);
            cursor: pointer;
            transition: all 0.2s;
        }
        .group-header:hover { background: #25211e; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--tf-black); }
        ::-webkit-scrollbar-thumb { background: var(--tf-orange); border: 2px solid var(--tf-black); }
        
        /* High-impact white italic with orange drop shadow */
        .tf-header-style {
            text-shadow: 3px 3px 0px rgba(239,110,20,1);
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed top-0 z-40 bg-[#3c352e] border-b-4 border-black w-full">
        <div class="container mx-auto px-4 flex justify-between items-center h-24">
            <div class="flex items-center">
                <h1 class="tf-font text-white text-6xl italic tracking-tighter tf-header-style leading-none">FUEY500</h1>
            </div>
            
            <div class="flex h-full items-center gap-4">
                <div class="hidden md:flex h-full py-5">
                    <button class="nav-btn active px-6 h-full tf-font italic text-2xl" data-target="logs">Blog</button>
                    <button class="nav-btn px-6 h-full tf-font italic text-2xl" data-target="videos">Videos</button>
                    <button class="nav-btn px-6 h-full tf-font italic text-2xl" data-target="comics">Comics</button>
                </div>

                <div class="relative ml-2">
                    <input type="text" id="masterSearch" placeholder="SEARCH ARCHIVES..." class="bg-black/40 border-2 border-black p-3 pl-10 text-xs tf-font italic text-orange-400 focus:border-orange-500 outline-none w-40 md:w-64">
                    <i class="fa-solid fa-search absolute left-4 top-4 text-[12px] text-slate-500"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 pt-32 pb-24" id="contentWrapper">
        <section id="logs" class="tab-content active max-w-4xl mx-auto space-y-6"></section>
        <section id="videos" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10" id="videoGrid"></div>
        </section>
        <section id="comics" class="tab-content">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="comicGrid"></div>
        </section>
    </main>

    <div id="adminPanel">
        <div class="flex justify-between items-center mb-6 border-b-2 border-slate-700 pb-4">
            <div>
                <h3 class="tf-font text-3xl text-orange-500 italic leading-none">Mission Command</h3>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Status: FUEY500 Override</p>
            </div>
            <button onclick="toggleAdmin()" class="text-slate-500 text-3xl hover:text-white">&times;</button>
        </div>
        
        <div class="space-y-6">
            <div class="bg-[#2a2521] p-5 mann-co-border">
                <p class="tf-font text-sm text-orange-400 mb-4 tracking-widest uppercase italic" id="formActionLabel">NEW INTEL DEPLOYMENT</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Asset Type</label>
                        <select id="entryType" class="w-full bg-black border border-slate-700 p-2 text-white text-sm focus:border-orange-500 outline-none">
                            <option value="logs">Service Log</option>
                            <option value="videos">Combat Clip</option>
                            <option value="comics">Classified Strip</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Subject Headline</label>
                        <input id="entryTitle" type="text" class="w-full bg-black border border-slate-700 p-2 text-white text-sm focus:border-orange-500 outline-none">
                    </div>

                    <div id="logSpecificFields" class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Images (paths, comma separated)</label>
                            <input id="entryImages" type="text" class="w-full bg-black border border-slate-700 p-2 text-white text-sm focus:border-orange-500 outline-none" placeholder="1.gif, 2.png">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Videos (paths, comma separated)</label>
                            <input id="entryLogVideos" type="text" class="w-full bg-black border border-slate-700 p-2 text-white text-sm focus:border-orange-500 outline-none" placeholder="v1.mp4, v2.webm">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Field Report</label>
                            <textarea id="entryContent" class="w-full bg-black border border-slate-700 p-2 h-24 text-white text-sm focus:border-orange-500 outline-none"></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Technical Blueprint</label>
                            <textarea id="entryBlueprint" class="w-full bg-black border border-slate-700 p-2 h-20 text-blue-300 font-mono text-xs focus:border-blue-500 outline-none"></textarea>
                        </div>
                    </div>

                    <div id="videoSpecificFields" class="hidden space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Intelligence Description</label>
                            <textarea id="entryDesc" class="w-full bg-black border border-slate-700 p-2 h-20 text-white text-sm focus:border-orange-500 outline-none"></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Video File (videos/...)</label>
                            <input id="entryUrl" type="text" class="w-full bg-black border border-slate-700 p-2 text-white text-sm focus:border-orange-500 outline-none">
                        </div>
                    </div>

                    <div id="comicSpecificFields" class="hidden space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Strip Path (comics/...)</label>
                            <input id="entryComicUrl" type="text" class="w-full bg-black border border-slate-700 p-2 text-white text-sm focus:border-orange-500 outline-none">
                        </div>
                    </div>

                    <div class="pt-4 flex gap-2">
                        <button id="saveBtn" onclick="saveEntry()" class="flex-1 bg-orange-600 hover:bg-orange-700 text-white tf-font py-3 text-lg italic shadow-[4px_4px_0px_#000]">EXECUTE COMMAND</button>
                        <button id="cancelBtn" onclick="resetForm()" class="hidden bg-slate-700 text-white tf-font px-4 py-3 italic shadow-[4px_4px_0px_#000]">CANCEL</button>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <p class="tf-font text-xs text-slate-500 mb-2 italic">MASTER ARCHIVE DATA (COMMIT REQUIRED)</p>
                <textarea id="jsonOutput" readonly class="w-full bg-black text-green-500 font-mono text-[9px] p-3 h-48 border border-slate-800 focus:outline-none"></textarea>
            </div>
        </div>
    </div>

    <div id="comicModal" class="fixed inset-0 z-50 bg-black/95 hidden items-center justify-center p-4" onclick="closeComic()">
        <div class="w-[95vw] h-[90vh] md:w-[90vw] md:h-[85vh] max-w-6xl flex flex-col mann-co-border overflow-hidden bg-black" onclick="event.stopPropagation()">
            <div class="bg-[#e1d8be] px-4 py-2 border-b-4 border-black flex justify-between items-center flex-shrink-0">
                <h2 id="modalTitle" class="tf-font text-xl md:text-2xl text-black italic uppercase tracking-tighter">CLASSIFIED: FUEY500</h2>
                <button onclick="closeComic()" class="text-black hover:text-orange-600 text-4xl leading-none font-bold">&times;</button>
            </div>
            <div class="flex-grow flex items-center justify-center bg-[#1a1714] overflow-auto relative">
                <img id="modalImg" src="" class="max-w-full max-h-full object-contain pointer-events-none">
            </div>
        </div>
    </div>

    <script>
        let siteData = {
            "logs": [
                {
                    "title": "Website",
                    "text": "I have exciting code changes to show, but I updated the website off google pages to a static html. It looks a lot nicer with the help of gemini.",
                    "blueprint": "",
                    "images": [],
                    "videos": [],
                    "date": "3.15.26"
                },
                {
                    "title": "Pathing",
                    "text": "So I got some stuff working, the pikmin path to the crumbs using a* but sometimes the threshold seems off and they circle lol. I improved my debug menu but google sites kinda sucks with not letting me upload longer/larger gifs. Ill likely migrate at some point.",
                    "blueprint": "",
                    "images": [],
                    "videos": [],
                    "date": "3.3.26"
                },
                {
                    "title": "Mina Robo",
                    "text": "Been a while, I've gone through many unfinished projects by now but I would really like to finish this one. Mina Robo is a pikmin-like game. Originally I wanted to combine billy hatcher, mischief makers, pikmin and prolly some more but as of right now to keep scope simple its mostly just the abilitys marina has with the pikmin gameplay.",
                    "blueprint": "",
                    "images": [],
                    "videos": ["v3.gif"],
                    "date": "2.22.26"
                },
                {
                    "title": "Hosting, Knockback, Cheetos",
                    "text": "I am running into terrible issues regarding godot networking, I seem to be stuck a bit with syncing my players on multiple clients. I also cannot call RPC's properly. I hope reddit will help.\n\nMy goal is to setup the score next, capture the cheetos, and make my player take knockback/damage to create a simple form of real gameplay.",
                    "blueprint": "",
                    "images": [],
                    "videos": ["v2.gif"],
                    "date": "4.17.24"
                },
                {
                    "title": "Start",
                    "text": "",
                    "blueprint": "",
                    "images": [],
                    "videos": ["v1.gif"],
                    "date": "3.12.24"
                }
            ],
            "videos": [
                { "title": "Pathing", "desc": "", "url": "v4.gif" },
                { "title": "Mina Robo", "desc": "", "url": "v3.gif" },
                { "title": "Hosting, Knockback, Cheetos", "desc": "", "url": "v2.gif" },
                { "title": "Bomberman", "desc": "", "url": "v1.gif" }
            ],
            "comics": [
                { "title": "2", "img": "2.png" },
                { "title": "1", "img": "1.png" }
            ]
        };

        let editingIdx = null;
        let editingType = null;
        let searchQuery = "";

        $(document).ready(function() {
            renderAll();

            $('.nav-btn').on('click', function() {
                $('.nav-btn').removeClass('active');
                $(this).addClass('active');
                $('.tab-content').hide();
                $('#' + $(this).data('target')).fadeIn(250);
            });

            $('#entryType').on('change', function() {
                const val = $(this).val();
                $('#logSpecificFields, #videoSpecificFields, #comicSpecificFields').addClass('hidden');
                if (val === 'logs') $('#logSpecificFields').removeClass('hidden');
                else if (val === 'videos') $('#videoSpecificFields').removeClass('hidden');
                else if (val === 'comics') $('#comicSpecificFields').removeClass('hidden');
            });

            $('#masterSearch').on('input', function() {
                searchQuery = $(this).val().toLowerCase();
                renderAll();
            });

            $(document).keydown(function(e) {
                if (e.ctrlKey && e.key === 'm') toggleAdmin();
            });
        });

        function getMonthName(m) {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            return months[parseInt(m) - 1];
        }

        function renderAll() {
            renderLogs();
            renderVideos();
            renderComics();
            updateJSONOutput();
        }

        function renderLogs() {
            const container = $('#logs').empty();
            const filtered = siteData.logs.filter(log => 
                log.title.toLowerCase().includes(searchQuery) || 
                log.text.toLowerCase().includes(searchQuery) ||
                (log.blueprint && log.blueprint.toLowerCase().includes(searchQuery))
            );

            if (filtered.length === 0) {
                container.append('<div class="tf-font text-slate-500 italic text-center py-10">NO MATCHING INTEL FOUND</div>');
                return;
            }

            const groups = {};
            filtered.forEach(log => {
                const parts = log.date.split('.');
                const key = `${getMonthName(parts[0])} 20${parts[2]}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(log);
            });

            Object.keys(groups).forEach((groupKey, gIdx) => {
                const groupContainerId = `group-${gIdx}`;
                container.append(`
                    <div class="mb-8">
                        <div class="group-header p-3 flex justify-between items-center mb-4" onclick="$('#${groupContainerId}').slideToggle(200); $(this).find('.chevron').toggleClass('rotate-180')">
                            <span class="tf-font text-orange-500 text-xl italic">${groupKey} <span class="text-slate-500 ml-2">(${groups[groupKey].length} FILES)</span></span>
                            <i class="fa-solid fa-chevron-down chevron transition-transform text-slate-600"></i>
                        </div>
                        <div id="${groupContainerId}" class="space-y-6">
                            ${groups[groupKey].map((log, i) => {
                                const realIdx = siteData.logs.indexOf(log);
                                
                                // Build Combined Media HTML
                                let mediaHTML = "";
                                if ((log.images && log.images.length > 0) || (log.videos && log.videos.length > 0)) {
                                    mediaHTML = `<div class="grid grid-cols-1 gap-4 mb-6">`;
                                    
                                    // Render Videos
                                    if (log.videos) {
                                        log.videos.forEach(vUrl => {
                                            const vPath = vUrl.startsWith('http') ? vUrl : `videos/${vUrl}`;
                                            const isGif = vUrl.toLowerCase().endsWith('.gif');
                                            if (isGif) {
                                                mediaHTML += `<div class="mann-co-border p-2 bg-black/20"><img src="${vPath}" class="w-full h-auto"></div>`;
                                            } else {
                                                mediaHTML += `<div class="mann-co-border p-2 bg-black/20"><video controls class="w-full h-auto"><source src="${vPath}" type="video/mp4"></video></div>`;
                                            }
                                        });
                                    }

                                    // Render Images
                                    if (log.images) {
                                        log.images.forEach(imgUrl => {
                                            const iPath = imgUrl.startsWith('http') ? imgUrl : `images/${imgUrl}`;
                                            mediaHTML += `<div class="mann-co-border p-2 bg-black/20"><img src="${iPath}" class="w-full h-auto grayscale hover:grayscale-0 transition-all"></div>`;
                                        });
                                    }

                                    mediaHTML += `</div>`;
                                }

                                return `
                                <article class="bg-[#332c26] mann-co-border relative overflow-hidden group">
                                    <div class="admin-controls">
                                        <button class="admin-btn" onclick="editEntry('logs', ${realIdx})"><i class="fa-solid fa-pen"></i></button>
                                        <button class="admin-btn delete bg-red-900/40 hover:bg-red-600" onclick="deleteEntry('logs', ${realIdx})"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    <div class="p-8">
                                        <div class="mb-4">
                                            <div class="tf-font text-rose-500 tracking-widest text-lg">${log.date}</div>
                                        </div>
                                        <h3 class="tf-font text-3xl text-white italic mb-6 border-l-8 border-orange-600 pl-4">${log.title}</h3>
                                        ${mediaHTML}
                                        <p class="text-slate-300 text-lg leading-relaxed mb-6 whitespace-pre-wrap">${log.text}</p>
                                        ${log.blueprint ? `<div class="blueprint-card p-5 rounded font-mono text-sm text-blue-100"><div class="text-blue-400 mb-2 border-b border-blue-400/30 pb-1 tf-font italic">Technical Dossier:</div><pre class="whitespace-pre-wrap">${log.blueprint}</pre></div>` : ''}
                                    </div>
                                </article>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            });
        }

        function renderVideos() {
            const container = $('#videoGrid').empty();
            const filtered = siteData.videos.filter(v => v.title.toLowerCase().includes(searchQuery) || v.desc.toLowerCase().includes(searchQuery));

            filtered.forEach((v) => {
                const idx = siteData.videos.indexOf(v);
                const isGif = v.url.toLowerCase().endsWith('.gif');
                const videoSrc = v.url.startsWith('http') ? v.url : `videos/${v.url}`;
                
                container.append(`
                    <div class="mann-co-border bg-[#332c26] overflow-hidden group relative">
                        <div class="admin-controls">
                            <button class="admin-btn" onclick="editEntry('videos', ${idx})"><i class="fa-solid fa-pen"></i></button>
                            <button class="admin-btn delete bg-red-900/40 hover:bg-red-600" onclick="deleteEntry('videos', ${idx})"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <div class="video-thumb bg-black">
                             ${isGif ? `<img src="${videoSrc}" class="w-full h-full object-cover">` : `<video controls class="w-full h-full object-cover"><source src="${videoSrc}" type="video/mp4"></video>`}
                        </div>
                        <div class="p-6 border-t-4 border-black bg-[#2b2622] flex justify-between items-start">
                            <div>
                                <h4 class="tf-font text-2xl text-white mb-1 italic tracking-tighter">${v.title}</h4>
                                <p class="text-slate-400 italic">${v.desc}</p>
                            </div>
                            <a href="${videoSrc}" target="_blank" class="bg-black/40 hover:bg-orange-600 p-2 text-white border border-slate-700 transition-colors" title="External Link">
                                <i class="fa-solid fa-up-right-from-square"></i>
                            </a>
                        </div>
                    </div>
                `);
            });
        }

        function renderComics() {
            const container = $('#comicGrid').empty();
            const filtered = siteData.comics.filter(c => c.title.toLowerCase().includes(searchQuery));

            filtered.forEach((c) => {
                const idx = siteData.comics.indexOf(c);
                container.append(`
                    <div class="mann-co-border bg-[#e1d8be] p-2 cursor-pointer group hover:-rotate-1 transition-transform relative" onclick="openComic('${c.title}', 'comics/${c.img}')">
                        <div class="admin-controls" onclick="event.stopPropagation()">
                            <button class="admin-btn" onclick="editEntry('comics', ${idx})"><i class="fa-solid fa-pen"></i></button>
                            <button class="admin-btn delete bg-red-900/40 hover:bg-red-600" onclick="deleteEntry('comics', ${idx})"><i class="fa-solid fa-trash"></i></button>
                        </div>
                        <div class="relative overflow-hidden bg-black h-48 flex items-center justify-center">
                            <img src="comics/${c.img}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity">
                        </div>
                        <div class="mt-3 text-black text-center border-t-2 border-black pt-2">
                            <p class="tf-font text-sm italic uppercase tracking-tighter">${c.title}</p>
                        </div>
                    </div>
                `);
            });
        }

        function deleteEntry(type, idx) {
            if(confirm("Confirm deletion of this record?")) {
                siteData[type].splice(idx, 1);
                renderAll();
            }
        }

        function editEntry(type, idx) {
            const item = siteData[type][idx];
            if (!item) return;
            editingIdx = idx; editingType = type;
            $('#entryType').val(type).trigger('change');
            $('#entryTitle').val(item.title);
            if (type === 'logs') { 
                $('#entryContent').val(item.text); 
                $('#entryBlueprint').val(item.blueprint || ''); 
                $('#entryImages').val(item.images ? item.images.join(', ') : ''); 
                $('#entryLogVideos').val(item.videos ? item.videos.join(', ') : ''); 
            }
            else if (type === 'videos') { $('#entryDesc').val(item.desc); $('#entryUrl').val(item.url); }
            else if (type === 'comics') { $('#entryComicUrl').val(item.img); }
            $('#formActionLabel').text('UPDATING CLASSIFIED INTEL');
            $('#saveBtn').text('UPDATE RECORD');
            $('#cancelBtn').removeClass('hidden');
            $('#adminPanel').show().scrollTop(0);
        }

        function saveEntry() {
            const type = $('#entryType').val(); 
            const title = $('#entryTitle').val();
            if (!title) return;

            let entry = { title };
            if (type === 'logs') {
                entry.text = $('#entryContent').val();
                entry.blueprint = $('#entryBlueprint').val();
                
                const rawImgs = $('#entryImages').val();
                entry.images = rawImgs ? rawImgs.split(',').map(s => s.trim()).filter(s => s) : [];
                
                const rawVids = $('#entryLogVideos').val();
                entry.videos = rawVids ? rawVids.split(',').map(s => s.trim()).filter(s => s) : [];
                
                if (editingIdx !== null && siteData.logs[editingIdx].date) {
                    entry.date = siteData.logs[editingIdx].date;
                } else {
                    const now = new Date();
                    entry.date = `${now.getMonth() + 1}.${now.getDate()}.${String(now.getFullYear()).slice(-2)}`;
                }
            } else if (type === 'videos') { 
                entry.desc = $('#entryDesc').val(); 
                entry.url = $('#entryUrl').val(); 
            } else if (type === 'comics') { 
                entry.img = $('#entryComicUrl').val(); 
            }
            
            if (editingIdx !== null) { 
                siteData[editingType][editingIdx] = entry; 
            } else { 
                siteData[type].unshift(entry); 
            }
            resetForm(); renderAll();
        }

        function resetForm() {
            editingIdx = null; editingType = null;
            $('#entryTitle, #entryContent, #entryBlueprint, #entryImages, #entryLogVideos, #entryDesc, #entryUrl, #entryComicUrl').val('');
            $('#formActionLabel').text('NEW INTEL DEPLOYMENT');
            $('#saveBtn').text('EXECUTE COMMAND');
            $('#cancelBtn').addClass('hidden');
        }

        function toggleAdmin() {
            $('#adminPanel').animate({ width: 'toggle' }, 300);
            $('body').toggleClass('admin-active');
            updateJSONOutput();
        }

        function updateJSONOutput() {
            $('#jsonOutput').val('let siteData = ' + JSON.stringify(siteData, null, 4) + ';');
        }

        function openComic(title, src) {
            $('#modalTitle').text(title); $('#modalImg').attr('src', src);
            $('#comicModal').css('display', 'flex').hide().fadeIn(200);
            $('body').addClass('overflow-hidden');
        }

        function closeComic() {
            $('#comicModal').fadeOut(200); $('body').removeClass('overflow-hidden');
        }
    </script>
</body>
</html>
